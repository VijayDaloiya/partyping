<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings | PartyBing Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background: #f5f5f5; }
        .admin-nav { background: #1a1a2e; color: white; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
        .admin-nav h2 { font-size: 1.1rem; }
        .admin-nav a { color: #aaa; margin-left: 20px; font-size: 0.9rem; text-decoration: none; }
        .admin-nav a:hover { color: white; }
        .admin-nav a.active { color: #e91e63; }
        .container { max-width: 800px; margin: 0 auto; padding: 24px; }
        .settings-form { background: white; padding: 32px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 16px; }
        label { font-size: 0.85rem; color: #666; font-weight: 500; display: block; margin-bottom: 4px; }
        input { width: 100%; padding: 10px 12px; border: 1.5px solid #e0e0e0; border-radius: 8px; font-size: 0.9rem; }
        .btn { padding: 12px 32px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.9rem; }
        .btn-save { background: #e91e63; color: white; }
        .btn-save:hover { background: #c2185b; }
        .divider { border-top: 1px solid #eee; margin: 24px 0; }
    </style>
</head>
<body>
    <nav class="admin-nav">
        <h2>🎈 PartyBing Admin</h2>
        <div>
            <a href="/admin/dashboard">Dashboard</a>
            <a href="/admin/services">Services</a>
            <a href="/admin/gallery">Gallery</a>
            <a href="/admin/testimonials">Testimonials</a>
            <a href="/admin/settings" class="active">Settings</a>
            <a href="/admin/logout">Logout</a>
        </div>
    </nav>

    <div class="container">
        <h2 style="margin-bottom:20px;">Site Settings</h2>
        <div class="settings-form">
            <form method="POST" action="/admin/settings">
                <h3 style="margin-bottom:16px;">Business Info</h3>
                <div class="form-group">
                    <label>Business Name</label>
                    <input type="text" name="business_name" value="{{ settings.business_name }}">
                </div>
                <div class="form-group">
                    <label>Tagline</label>
                    <input type="text" name="tagline" value="{{ settings.tagline }}">
                </div>
                <div class="form-group">
                    <label>Phone (with country code, e.g. 919503146681)</label>
                    <input type="text" name="phone" value="{{ settings.phone }}">
                </div>
                <div class="form-group">
                    <label>WhatsApp Number</label>
                    <input type="text" name="whatsapp" value="{{ settings.whatsapp }}">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" value="{{ settings.email }}">
                </div>
                <div class="form-group">
                    <label>Address</label>
                    <input type="text" name="address" value="{{ settings.address }}">
                </div>

                <div class="divider"></div>
                <h3 style="margin-bottom:16px;">Social Media</h3>
                <div class="form-group">
                    <label>Instagram URL</label>
                    <input type="url" name="instagram" value="{{ settings.instagram or '' }}">
                </div>
                <div class="form-group">
                    <label>Facebook URL</label>
                    <input type="url" name="facebook" value="{{ settings.facebook or '' }}">
                </div>
                <div class="form-group">
                    <label>Google Maps URL</label>
                    <input type="url" name="google_maps" value="{{ settings.google_maps or '' }}">
                </div>

                <div class="divider"></div>
                <h3 style="margin-bottom:16px;">Security</h3>
                <div class="form-group">
                    <label>Admin Password</label>
                    <input type="text" name="admin_password" value="{{ settings.admin_password }}">
                </div>

                <button type="submit" class="btn btn-save" style="margin-top:12px;">Save All Settings</button>
            </form>
        </div>
    </div>
</body>
</html>
