<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testimonials | PartyBing Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background: #f5f5f5; }
        .admin-nav { background: #1a1a2e; color: white; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
        .admin-nav h2 { font-size: 1.1rem; }
        .admin-nav a { color: #aaa; margin-left: 20px; font-size: 0.9rem; text-decoration: none; }
        .admin-nav a:hover { color: white; }
        .admin-nav a.active { color: #e91e63; }
        .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
        .add-form { background: white; padding: 24px; border-radius: 12px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .form-row { display: flex; gap: 12px; flex-wrap: wrap; }
        .form-row > div { flex: 1; min-width: 150px; }
        label { font-size: 0.8rem; color: #666; font-weight: 500; display: block; margin-bottom: 4px; }
        input, textarea, select { width: 100%; padding: 10px 12px; border: 1.5px solid #e0e0e0; border-radius: 8px; font-size: 0.9rem; font-family: inherit; }
        .btn { padding: 10px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.85rem; }
        .btn-save { background: #e91e63; color: white; }
        .testimonial-card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .stars { color: #ffc107; }
    </style>
</head>
<body>
    <nav class="admin-nav">
        <h2>🎈 PartyBing Admin</h2>
        <div>
            <a href="/admin/dashboard">Dashboard</a>
            <a href="/admin/services">Services</a>
            <a href="/admin/gallery">Gallery</a>
            <a href="/admin/testimonials" class="active">Testimonials</a>
            <a href="/admin/settings">Settings</a>
            <a href="/admin/logout">Logout</a>
        </div>
    </nav>

    <div class="container">
        <div class="add-form">
            <h3 style="margin-bottom:16px;">Add Testimonial</h3>
            <form method="POST" action="/admin/testimonials/add">
                <div class="form-row">
                    <div>
                        <label>Customer Name</label>
                        <input type="text" name="name" required>
                    </div>
                    <div>
                        <label>Rating</label>
                        <select name="rating">
                            <option value="5">5 Stars</option>
                            <option value="4">4 Stars</option>
                            <option value="3">3 Stars</option>
                        </select>
                    </div>
                    <div>
                        <label>Service</label>
                        <input type="text" name="service" placeholder="e.g. Birthday Decoration">
                    </div>
                </div>
                <div style="margin-top:12px;">
                    <label>Review Text</label>
                    <textarea name="text" rows="3" required placeholder="Customer review..."></textarea>
                </div>
                <button type="submit" class="btn btn-save" style="margin-top:12px;">Add Testimonial</button>
            </form>
        </div>

        <h3 style="margin-bottom:16px;">All Testimonials</h3>
        {% for t in testimonials %}
        <div class="testimonial-card">
            <div class="stars">{% for i in range(t.rating) %}⭐{% endfor %}</div>
            <p style="margin:8px 0; font-style:italic; color:#666;">"{{ t.text }}"</p>
            <strong>{{ t.name }}</strong> <span style="color:#e91e63; font-size:0.85rem;">· {{ t.service }}</span>
        </div>
        {% endfor %}
    </div>
</body>
</html>
